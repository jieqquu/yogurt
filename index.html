<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="優格調配板">
<title>優格出餐調配板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --text: #1a1814;
    --text2: #6b6560;
    --text3: #a09a94;
    --accent: #2d5a3d;
    --accent-light: #e8f0eb;
    --accent-text: #1e3d2a;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.15);
    --radius: 14px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141210;
      --surface: #1e1c19;
      --surface2: #252320;
      --text: #f0ece6;
      --text2: #9a948e;
      --text3: #6a6460;
      --accent: #4a8c60;
      --accent-light: #1a2e20;
      --accent-text: #8fd4a8;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
    }
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; overflow-x: hidden; }
  body { padding: 0 0 env(safe-area-inset-bottom, 20px); }

  .app-header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 20px 14px;
    position: sticky; top: 0; z-index: 20;
  }
  .app-header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
  .app-header p { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .tabs-wrap { 
    background: var(--surface); 
    padding: 12px 16px; 
    border-bottom: 0.5px solid var(--border); 
    overflow-x: auto; 
    -webkit-overflow-scrolling: touch; 
    display: block !important; /* 強制顯示 */
    min-height: 50px;
  }
  .tabs { display: flex; gap: 8px; width: max-content; }
  .tab-btn {
    padding: 8px 18px; border-radius: 20px;
    border: 0.5px solid var(--border2);
    background: transparent; color: var(--text2);
    font-size: 14px; cursor: pointer; white-space: nowrap;
    font-family: inherit; transition: all 0.18s;
    flex-shrink: 0;
  }
  .tab-btn.active {
    background: var(--accent); color: #fff;
    border-color: var(--accent); font-weight: 500;
  }

  .content { padding: 16px; display: flex; flex-direction: column; gap: 14px; max-width: 600px; margin: 0 auto; }

  .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .sum-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
  .sum-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .sum-val { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
  .sum-unit { font-size: 11px; color: var(--text3); margin-left: 1px; }

  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-title { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; padding: 14px 16px 0; }

  .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 16px 16px; }
  .inp-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .inp-row { display: flex; align-items: center; gap: 8px; }
  .inp-row input {
    flex: 1; min-width: 0; height: 44px; padding: 0 12px;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text);
    font-size: 16px; font-family: inherit; outline: none;
    -webkit-appearance: none;
  }
  .inp-row input:focus { border-color: var(--accent); }
  .inp-unit { font-size: 13px; color: var(--text3); }

  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; color: var(--text3); font-weight: 400; text-align: left; padding: 10px 16px 8px; border-bottom: 0.5px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 0.5px solid var(--border); font-size: 15px; }
  .td-name { color: var(--text); font-weight: 500; }
  .td-base { color: var(--text3); font-size: 12px; }
  .td-inp { display: flex; align-items: center; gap: 6px; }
  .td-inp input {
    width: 90px; height: 40px; padding: 0 10px;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text);
    font-size: 16px; outline: none; -webkit-appearance: none;
  }
  tr.yogurt-row td { background: var(--accent-light); }
  tr.total-row td { background: var(--surface2); font-size: 13px; font-weight: 600; }

  .reset-wrap { padding: 12px 16px 14px; }
  .reset-btn {
    width: 100%; padding: 12px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: transparent;
    color: var(--text2); font-size: 14px; cursor: pointer;
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>優格出餐調配板</h1>
  <p>輸入任一欄位，其餘自動換算</p>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="flavorTabs"></div>
</div>

<div class="content">
  <div class="summary-row">
    <div class="sum-card"><div class="sum-label">優格</div><div><span class="sum-val" id="r-yogurt">—</span><span class="sum-unit">g</span></div></div>
    <div class="sum-card"><div class="sum-label">總重</div><div><span class="sum-val" id="r-total">—</span><span class="sum-unit">g</span></div></div>
    <div class="sum-card"><div class="sum-label">份數</div><div><span class="sum-val" id="r-portions">—</span><span class="sum-unit">份</span></div></div>
  </div>

  <div class="card">
    <div class="card-title">快速輸入</div>
    <div class="quick-grid">
      <div><div class="inp-label">優格重量</div><div class="inp-row"><input type="number" inputmode="decimal" id="yogurtInput" placeholder="500"><span class="inp-unit">克</span></div></div>
      <div><div class="inp-label">成品總重</div><div class="inp-row"><input type="number" inputmode="decimal" id="totalInput" placeholder="714"><span class="inp-unit">克</span></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">食材明細</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>食材</th><th>基準</th><th>用量</th></tr></thead>
        <tbody id="ingredientBody"></tbody>
      </table>
    </div>
    <div class="reset-wrap"><button class="reset-btn" id="resetBtn">重置清空</button></div>
  </div>
</div>

<script>
const flavors = [
  { name: "蘋果伯爵", portionSize: 200, ingredients: [{ name: "優格", key: "yogurt", base: 500 }, { name: "蘋果醬", key: "apple", base: 200 }, { name: "伯爵茶粉", key: "earl", base: 14 }] },
  { name: "黑芝麻", portionSize: 200, ingredients: [{ name: "優格", key: "yogurt", base: 500 }, { name: "芝麻醬", key: "sesame", base: 50 }, { name: "海藻糖", key: "trehalose", base: 100 }] },
  { name: "開心果", portionSize: 131, ingredients: [{ name: "優格", key: "yogurt", base: 100 }, { name: "開心果醬", key: "pistachio", base: 12 }, { name: "海藻糖", key: "trehalose", base: 19 }, { name: "海鹽", key: "salt", base: 0.3 }] },
  { name: "蘋果肉桂", portionSize: 180, ingredients: [{ name: "優格", key: "yogurt", base: 375 }, { name: "蘋果醬", key: "apple", base: 162 }, { name: "肉桂粉", key: "cinnamon", base: 3 }] },
  { name: "焙茶", portionSize: 60, ingredients: [{ name: "優格", key: "yogurt", base: 50 }, { name: "焙茶粉", key: "hojicha", base: 2 }, { name: "海藻糖", key: "trehalose", base: 8 }] }
];

let current = 0;

function selectFlavor(idx) {
  current = idx;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.getElementById('yogurtInput').value = '';
  document.getElementById('totalInput').value = '';
  renderTable(null);
  updateSummary(null);
}

function renderTable(totalGrams) {
  const f = flavors[current];
  const ft = f.ingredients.reduce((s,i) => s+i.base, 0);
  const tbody = document.getElementById('ingredientBody');
  tbody.innerHTML = '';
  f.ingredients.forEach((ing, i) => {
    const amt = totalGrams !== null ? Math.round(totalGrams * (ing.base / ft) * 10) / 10 : '';
    const tr = document.createElement('tr');
    if (ing.key === 'yogurt') tr.classList.add('yogurt-row');
    tr.innerHTML = `<td class="td-name">${ing.name}<br><span class="td-base">${ing.base}g</span></td><td>${ing.base}g</td><td><div class="td-inp"><input type="number" inputmode="decimal" value="${amt}" data-ing="${i}"><span>g</span></div></td>`;
    tbody.appendChild(tr);
  });
  
  tbody.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const val = parseFloat(e.target.value);
      if (isNaN(val)) return;
      const newTotal = val / (f.ingredients[e.target.dataset.ing].base / ft);
      updateAll(newTotal);
    });
  });
}

function updateAll(total) {
  const f = flavors[current];
  const ft = f.ingredients.reduce((s,i) => s+i.base, 0);
  const yBase = f.ingredients.find(i=>i.key==='yogurt').base;
  document.getElementById('yogurtInput').value = Math.round(total * (yBase/ft) * 10) / 10;
  document.getElementById('totalInput').value = Math.round(total * 10) / 10;
  renderTable(total);
  updateSummary(total);
}

function updateSummary(total) {
  const f = flavors[current];
  const ft = f.ingredients.reduce((s,i) => s+i.base, 0);
  const yBase = f.ingredients.find(i=>i.key==='yogurt').base;
  document.getElementById('r-yogurt').textContent = total ? Math.round(total * (yBase/ft)) : '—';
  document.getElementById('r-total').textContent = total ? Math.round(total) : '—';
  document.getElementById('r-portions').textContent = total ? Math.round(total/f.portionSize * 10)/10 : '—';
}

const tabsEl = document.getElementById('flavorTabs');
flavors.forEach((f,i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i===0?' active':'');
  btn.textContent = f.name;
  btn.onclick = () => selectFlavor(i);
  tabsEl.appendChild(btn);
});

document.getElementById('yogurtInput').addEventListener('input', e => {
  const f = flavors[current];
  const ft = f.ingredients.reduce((s,i) => s+i.base, 0);
  const yBase = f.ingredients.find(i=>i.key==='yogurt').base;
  updateAll(parseFloat(e.target.value) / (yBase/ft));
});

document.getElementById('totalInput').addEventListener('input', e => updateAll(parseFloat(e.target.value)));
document.getElementById('resetBtn').addEventListener('click', () => selectFlavor(current));

renderTable(null);
</script>
</body>
</html>
